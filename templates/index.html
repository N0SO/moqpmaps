<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Missouri QSO Party County Activation/Route Planner</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    #map { height: 100vh; width: 100%; }

    .plan-control {
      background: white;
      padding: 6px;
      z-index: 1000;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([38.5, -92.5], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

const PlanControl = L.Control.extend({
  options: { position: 'topright' },
  onAdd: function () {
    const div = L.DomUtil.create('div', 'plan-control');
    div.innerHTML = `
      <h3>Missouri QSO Party County Activation/Route Planner</h3>
      <p>Enter your callsign and click <i>New Plan</i> or <br>
         <i>Load Plan</i>. Click on the counties you plan to <br>
         activate. They will turn red. Click <i>Save</i>, <br>
         then refresh the browser.</p>
      <p><a href="{{ url_for('howto') }}"><button>More Details</button></a></p>
      <p>Callsign: <input id="callsign" placeholder="N0CALL"></p>
      <button onclick="savePlan()">Save</button>
      <button onclick="loadPlan()">Load Plan</button>
      <button onclick="startPlanning()">New Plan</button>
    `;
    return div;
  }
});
map.addControl(new PlanControl());

let allActiveCounties = new Map();  // aggregated DB data
let myPlanCounties = new Map();     // this operator’s plan
let countyLayer;

function countyId(f) {
  return `${f.properties.STATE}${f.properties.COUNTY}`;
}

function countyStyle(feature) {
  const id = countyId(feature);

  if (myPlanCounties.has(id)) {
    return {
      color: '#000',
      weight: 1,
      fillColor: '#ff0000',   // MY plan
      fillOpacity: 0.8
    };
  }

  if (allActiveCounties.has(id)) {
    return {
      color: '#333',
      weight: 1,
      fillColor: '#e74c3c',   // Someone else
      fillOpacity: 0.6
    };
  }

  return {
    color: '#333',
    weight: 1,
    fillColor: '#5dade2',    // Unclaimed
    fillOpacity: 0.7
  };
}

function startPlanning() {
  myPlanCounties.clear();
  countyLayer.setStyle(countyStyle);
}

function savePlan() {
  const plan = {
    callsign: document.getElementById('callsign').value || "UNKNOWN",
    event: "MO_QSO_PARTY",
    counties: [...myPlanCounties.values()]
  };

  fetch('/api/savePlan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(plan)
  }).then(() => alert("Plan saved"));
}

function loadPlan() {
  const callsign = document.getElementById('callsign').value;
  if (!callsign) return;

  fetch(`/api/loadPlan?callsign=${callsign}&event=MO_QSO_PARTY`)
    .then(r => r.json())
    .then(data => {
      myPlanCounties.clear();
      data.forEach(c => {
        myPlanCounties.set(`${c.stateFips}${c.countyFips}`, c);
      });
      countyLayer.setStyle(countyStyle);
    });
}

fetch('https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json')
  .then(r => r.json())
  .then(data => {
    const mo = data.features.filter(f => f.properties.STATE === "29");

    countyLayer = L.geoJSON(mo, {
      style: countyStyle,
      onEachFeature: (feature, layer) => {
        const type = feature.properties.LSAD === "city" ? "City" : "County";
        //const type = feature.properties.LSAD === "25" ? "City" : "County";

layer.bindTooltip("", { sticky: true });

layer.on('mouseover', () => {
  const id = countyId(feature);
  const baseName = `${feature.properties.NAME} ${type}`;

  if (allActiveCounties.has(id)) {
    const calls = allActiveCounties.get(id).callsigns;
    layer.setTooltipContent(
      `${baseName}<br><b>Active:</b> ${calls.join('<br>')}`
    );
  } else {
    layer.setTooltipContent(baseName);
  }
});


layer.on('click', () => {
  const id = countyId(feature);

  if (myPlanCounties.has(id)) {
    myPlanCounties.delete(id);
  } else {
    myPlanCounties.set(id, {
      stateFips: feature.properties.STATE,
      countyFips: feature.properties.COUNTY,
      name: feature.properties.NAME,
      type
    });
  }

  countyLayer.setStyle(countyStyle);
});

      }
    }).addTo(map);

// Load all active counties on startup
fetch('/api/allActive')
  .then(r => r.json())
  .then(data => {
    data.forEach(c => {
      const id = `${c.stateFips}${c.countyFips}`;

      allActiveCounties.set(id, {
        callsigns: c.callsigns
          ? c.callsigns.split(',')
          : []
      });
    });

    countyLayer.setStyle(countyStyle);
  });



  });
</script>

</body>
</html>
